<svg width="640" height="180" viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>GPS OS</title>
  <desc>GPS OS logo lockup: the navy waypoint-loop mark beside the wordmark "GPS OS" with the caption "operating system".</desc>
  <g transform="translate(-4.2,-4.2) scale(0.85)">
    <path d="M100,168 A68,68 0 1 1 134,158.89" fill="none" stroke="#1C2B49" stroke-width="7" stroke-linecap="round"/>
    <polygon points="126.73,163.09 134.35,148.3 143.35,163.88" fill="#1C2B49"/>
    <circle cx="100" cy="168" r="8.5" fill="#BB8C3E"/>
  </g>
  <text x="190" y="98" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="700" letter-spacing="2" fill="#1C2B49">GPS<tspan fill="#BB8C3E"> OS</tspan></text>
  <text x="192" y="128" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" letter-spacing="4" fill="#5B5A54">OPERATING SYSTEM</text>
