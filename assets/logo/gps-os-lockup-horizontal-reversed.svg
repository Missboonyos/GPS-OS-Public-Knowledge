<svg width="640" height="180" viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>GPS OS (reversed)</title>
  <desc>Reversed-color GPS OS logo lockup for dark backgrounds: the parchment waypoint-loop mark beside the wordmark "GPS OS" with the caption "operating system".</desc>
  <g transform="translate(-4.2,-4.2) scale(0.85)">
    <path d="M100,168 A68,68 0 1 1 134,158.89" fill="none" stroke="#F2ECDD" stroke-width="7" stroke-linecap="round"/>
    <polygon points="126.73,163.09 134.35,148.3 143.35,163.88" fill="#F2ECDD"/>
    <circle cx="100" cy="168" r="8.5" fill="#D6A94F"/>
  </g>
  <text x="190" y="98" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="700" letter-spacing="2" fill="#F2ECDD">GPS<tspan fill="#D6A94F"> OS</tspan></text>
  <text x="192" y="128" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" letter-spacing="4" fill="#B9B4A6">OPERATING SYSTEM</text>
</svg>
